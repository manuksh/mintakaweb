<svg width="100%" viewBox="0 0 680 280" role="img" xmlns="http://www.w3.org/2000/svg">
<title>FPGA Design and Verification Banner — Mintaka LLC</title>
<desc>Dark tech banner showing an FPGA chip with circuit traces, signal waveforms, and the text FPGA Design and Verification for Mintaka LLC</desc>
<defs>
  <style>
    .banner-bg { fill: #0a0e1a; }
    .grid-line { stroke: rgba(0,180,255,0.06); stroke-width: 0.5; fill: none; }
    .trace { stroke: #00b4ff; stroke-width: 1; fill: none; opacity: 0.5; }
    .trace-bright { stroke: #00b4ff; stroke-width: 1.5; fill: none; opacity: 0.9; }
    .trace-dim { stroke: #0057a8; stroke-width: 0.8; fill: none; opacity: 0.6; }
    .via { fill: #00b4ff; opacity: 0.7; }
    .via-dim { fill: #0057a8; opacity: 0.5; }
    .chip-body { fill: #111827; stroke: #00b4ff; stroke-width: 1.5; }
    .chip-inner { fill: #0a1628; stroke: #1a3a5a; stroke-width: 0.8; }
    .chip-pin { fill: #00b4ff; opacity: 0.85; }
    .chip-label { fill: #00b4ff; font-family: 'Courier New', monospace; font-size: 8px; letter-spacing: 0.05em; }
    .chip-cross { stroke: #1a3a5a; stroke-width: 0.6; fill: none; }
    .logic-cell { fill: #0f2040; stroke: #00b4ff; stroke-width: 0.8; opacity: 0.8; }
    .wave-line { stroke: #00ffcc; stroke-width: 1.5; fill: none; }
    .wave-line2 { stroke: #00b4ff; stroke-width: 1.2; fill: none; opacity: 0.8; }
    .wave-line3 { stroke: #0057a8; stroke-width: 1; fill: none; opacity: 0.7; }
    .wave-label { fill: #6a85a0; font-family: 'Courier New', monospace; font-size: 7px; }
    .wave-box { fill: #0a0e1a; stroke: #1a2a3a; stroke-width: 0.8; }
    .heading { fill: #ffffff; font-family: 'Courier New', monospace; font-size: 22px; font-weight: bold; letter-spacing: 0.12em; }
    .subhead { fill: #00b4ff; font-family: 'Courier New', monospace; font-size: 11px; letter-spacing: 0.18em; }
    .tag { fill: #0f1628; stroke: #00b4ff; stroke-width: 0.8; }
    .tag-text { fill: #00b4ff; font-family: 'Courier New', monospace; font-size: 8px; letter-spacing: 0.1em; }
    .divider { stroke: #1a3a5a; stroke-width: 0.8; fill: none; }
    .accent-line { stroke: #00b4ff; stroke-width: 2; fill: none; }
    .glow-dot { fill: #00b4ff; }
    .dim-text { fill: #1a3a5a; font-family: 'Courier New', monospace; font-size: 7px; }
  </style>
</defs>

